<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI人格动物相机</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Ctext y=%2250%22 font-size=%2248%22%3E%F0%9F%90%B2%3C/text%3E%3C/svg%3E" />
  <style>

    :root {
      --bg: #eef3ff;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: rgba(255,255,255,0.26);
      --primary: #2563eb;
      --primary-soft: rgba(37,99,235,0.12);
      --dark: rgba(17,24,39,0.68);
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      --radius: 24px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: linear-gradient(180deg, #f7f9ff 0%, #edf3ff 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      overscroll-behavior-y: contain;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(12px + var(--safe-top)) max(12px, var(--safe-left)) calc(108px + var(--safe-bottom)) max(12px, var(--safe-right));
      position: relative;
    }

    .viewer {
      min-height: calc(100vh - 132px - var(--safe-bottom) - var(--safe-top));
      min-height: calc(100dvh - 132px - var(--safe-bottom) - var(--safe-top));
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.18), transparent 24%),
        linear-gradient(180deg, #f5f8ff 0%, #e8efff 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.75);
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .viewer-head-copy {
      flex: 1;
      min-width: 0;
      padding: 4px 2px 0;
    }

    .scene-title {
      color: var(--text);
      font-size: clamp(20px, 4.8vw, 32px);
      font-weight: 900;
      line-height: 1.16;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .scene-desc {
      font-size: 13px;
      line-height: 1.55;
      color: #5a6375;
      word-break: break-word;
    }

    .mini-tag {
      flex-shrink: 0;
      max-width: 42%;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
      background: rgba(17,24,39,0.08);
      color: #374151;
      border: 1px solid rgba(148,163,184,0.22);
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-stage {
      position: relative;
      flex: 1;
      min-height: 320px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.12), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #edf3ff 100%);
      border: 1px solid rgba(255,255,255,0.82);
      isolation: isolate;
    }

    .viewer-image,
    .viewer-empty,
    .loading-mask {
      position: absolute;
      inset: 0;
    }

    .viewer-image {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: cover;
      background: #f3f4f6;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
    }

    .viewer-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.42) 100%);
    }

    .viewer-empty strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      margin-bottom: 10px;
    }

    .viewer-foot {
      display: flex;
      justify-content: center;
      padding: 2px 4px 0;
    }

    .hint-pill {
      width: 100%;
      max-width: 100%;
      border-radius: 16px;
      padding: 11px 14px;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      color: #5b6476;
      background: rgba(17,24,39,0.06);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: none;
    }

    .status-inline {
      position: fixed;
      left: 50%;
      bottom: calc(98px + var(--safe-bottom));
      z-index: 45;
      width: min(calc(100% - 24px), 520px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      background: rgba(17,24,39,0.78);
      color: #fff;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 14px 28px rgba(15,23,42,0.24);
      opacity: 0;
      transform: translateX(-50%) translateY(10px);
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }

    .status-inline.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #60a5fa;
      flex-shrink: 0;
    }

    .loading-mask {
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(17,24,39,0.36);
      color: #fff;
      backdrop-filter: blur(10px);
    }

    .loading-mask.show {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.28);
      border-top-color: #fff;
      animation: spin .9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .control-sheet {
      position: fixed;
      left: 50%;
      bottom: calc(84px + var(--safe-bottom));
      transform: translate(-50%, 18px);
      width: min(calc(100% - 24px), 536px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }

    .control-sheet.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .sheet-card {
      border-radius: 24px;
      padding: 14px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 18px 40px rgba(15,23,42,0.14);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.75);
    }

    .sheet-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 800;
    }

    .sheet-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      background: #eef2ff;
      color: #334155;
      font-size: 20px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .age-panel,
    .zodiac-panel {
      display: none;
    }

    .age-panel.show,
    .zodiac-panel.show {
      display: block;
    }

    .age-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .age-current {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
    }

    .age-tip {
      font-size: 12px;
      color: var(--muted);
    }

    .range-wrap {
      padding: 8px 2px 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 40px;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #93c5fd 0%, #3b82f6 45%, #8b5cf6 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      margin-top: -10px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid var(--primary);
      box-shadow: 0 6px 18px rgba(37,99,235,0.28);
    }

    .age-marks {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .age-actions,
    .chooser-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .primary-btn,
    .soft-btn,
    .select-trigger,
    .option-chip,
    .bottom-btn {
      border: none;
      cursor: pointer;
      transition: transform .14s ease, opacity .14s ease, background .14s ease;
      touch-action: manipulation;
    }

    .ghost-btn:active,
    .primary-btn:active,
    .soft-btn:active,
    .select-trigger:active,
    .option-chip:active,
    .bottom-btn:active {
      transform: scale(.98);
    }

    .ghost-btn,
    .primary-btn,
    .soft-btn {
      min-height: 46px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      flex: 1;
    }

    .primary-btn {
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: #fff;
      box-shadow: 0 12px 26px rgba(37,99,235,0.20);
    }

    .ghost-btn {
      background: #eef2ff;
      color: #334155;
    }

    .soft-btn {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #e5e7eb;
    }

    .select-trigger {
      width: 100%;
      min-height: 48px;
      border-radius: 16px;
      padding: 12px 14px;
      background: #f8fbff;
      border: 1px solid #dbe6ff;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
    }

    .select-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .hidden-menu {
      display: none;
      margin-top: 10px;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .hidden-menu.show {
      display: grid;
    }

    .option-chip {
      min-height: 44px;
      border-radius: 14px;
      background: #f3f6fb;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .option-chip.active {
      background: rgba(37,99,235,0.12);
      color: var(--primary);
      border-color: rgba(37,99,235,0.2);
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.16);
      backdrop-filter: blur(5px);
      z-index: 18;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 560px);
      z-index: 30;
      padding: 10px max(12px, var(--safe-left)) calc(12px + var(--safe-bottom)) max(12px, var(--safe-right));
      background: linear-gradient(180deg, rgba(247,249,255,0) 0%, rgba(247,249,255,0.75) 20%, rgba(247,249,255,0.98) 42%, rgba(247,249,255,1) 100%);
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      justify-content: center;
      align-items: stretch;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 24px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.78);
      box-shadow: 0 18px 45px rgba(15,23,42,0.10);
      backdrop-filter: blur(16px);
    }

    .bottom-btn {
      min-height: 62px;
      border-radius: 18px;
      background: #f8fbff;
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
      min-width: 0;
    }

    .bottom-btn .label {
      display: block;
      white-space: nowrap;
      line-height: 1.15;
    }

    .bottom-btn.active {
      color: var(--primary);
      background: rgba(37,99,235,0.12);
      border-color: rgba(37,99,235,0.18);
    }

    .bottom-btn .icon {
      font-size: 20px;
      line-height: 1;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(18px, var(--safe-top)) max(18px, var(--safe-right)) max(18px, calc(var(--safe-bottom) + 18px)) max(18px, var(--safe-left));
      background: rgba(15,23,42,0.42);
      backdrop-filter: blur(8px);
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(100%, 420px);
      max-height: 86vh;
      max-height: 86dvh;
      overflow: auto;
      background: #fff;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 22px 48px rgba(15,23,42,0.25);
      -webkit-overflow-scrolling: touch;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .modal-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .confirm-preview {
      width: 100%;
      aspect-ratio: 1 / 1.18;
      object-fit: cover;
      border-radius: 18px;
      background: #f3f4f6;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 430px) {
      .mini-tag {
        max-width: 46%;
      }

      .hidden-menu {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 380px) {
      .app {
        padding-left: max(10px, var(--safe-left));
        padding-right: max(10px, var(--safe-right));
      }

      .viewer {
        padding: 12px;
      }

      .scene-title {
        font-size: 18px;
      }

      .scene-desc {
        font-size: 12px;
      }

      .bottom-btn {
        min-height: 58px;
        font-size: 11px;
      }

      .bottom-btn .icon {
        font-size: 18px;
      }

      .bottom-grid {
        gap: 6px;
        padding: 7px 8px;
      }

      .status-inline {
        width: min(calc(100% - 20px), 520px);
      }
    }

    @media (max-width: 340px) {
      .hidden-menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .bottom-btn {
        min-height: 56px;
        font-size: 10.5px;
      }

      .bottom-btn .icon {
        font-size: 17px;
      }

      .modal-actions,
      .age-actions,
      .chooser-actions {
        flex-direction: column;
      }
    }

  </style>
</head>
<body>
  <div class="app">
    <main class="viewer" id="viewer">
      <div class="viewer-header">
        <div class="viewer-head-copy">
          <div class="scene-title" id="sceneTitle">原图</div>
          <div class="scene-desc" id="sceneDesc">等待上传头像（人格照片 / 动物头像版）</div>
        </div>
        <div class="mini-tag" id="modeTag">未开始</div>
      </div>

      <div class="viewer-stage" id="viewerStage">
        <img id="viewerImage" class="viewer-image" alt="预览图" />
        <div class="viewer-empty" id="viewerEmpty">
          <div>
            <strong>上传或拍摄头像</strong>
            <div>整页只保留一个主显示区。<br>先确认头像，再用人格照片或动物头像生成效果。</div>
          </div>
        </div>

        <div class="loading-mask" id="loadingMask">
          <div class="spinner"></div>
          <div id="loadingText">正在处理中...</div>
        </div>
      </div>

      <div class="viewer-foot">
        <div class="hint-pill" id="hintPill">长按主图可临时查看原图</div>
      </div>
    </main>
  </div>

  <div class="status-inline" id="statusInline">
    <span class="status-dot"></span>
    <span id="statusText">准备就绪</span>
  </div>

  <div class="backdrop" id="panelBackdrop"></div>

  <section class="control-sheet" id="controlSheet">
    <div class="sheet-card">
      <div class="sheet-top">
        <div>
          <div class="sheet-title" id="sheetTitle">人格照片</div>
          <div class="sheet-desc" id="sheetDesc">选择 MBTI 类型后，生成符合人格气质的人格照片</div>
        </div>
        <button class="close-btn" id="closeSheetBtn" aria-label="关闭">×</button>
      </div>

      <div class="age-panel" id="personalityPanel">
        <button class="select-trigger" id="personalityTrigger">
          <div>
            <div id="personalityChosen">我的人格类型</div>
            <div class="select-sub">点击展开 MBTI 选项</div>
          </div>
          <span id="personalityArrow">▾</span>
        </button>
        <div class="hidden-menu" id="personalityMenu"></div>
        <div class="chooser-actions">
          <button class="ghost-btn" id="personalityGenerateBtn">生成人格照片</button>
        </div>
      </div>

      <div class="zodiac-panel" id="zodiacPanel">
        <button class="select-trigger" id="zodiacTrigger">
          <div>
            <div id="zodiacChosen">请选择动物头像</div>
            <div class="select-sub">点击展开动物选项</div>
          </div>
          <span id="zodiacArrow">▾</span>
        </button>
        <div class="hidden-menu" id="zodiacMenu"></div>
        <div class="chooser-actions">
          <button class="soft-btn" id="zodiacOriginalBtn">恢复原图</button>
          <button class="ghost-btn" id="zodiacRetryBtn">重新生成当前动物</button>
        </div>
      </div>
    </div>
  </section>

  <nav class="bottom-bar">
    <div class="bottom-grid">
      <button class="bottom-btn" id="bgmBtn" aria-pressed="true" aria-label="背景音乐开关">
        <span class="icon" id="bgmIcon">🔊</span>
        <span class="label" id="bgmLabel">音乐开</span>
      </button>
      <button class="bottom-btn" id="uploadBtn">
        <span class="icon">🖼️</span>
        <span class="label">上传头像</span>
      </button>
      <button class="bottom-btn" id="cameraBtn">
        <span class="icon">📷</span>
        <span class="label">拍摄头像</span>
      </button>
      <button class="bottom-btn" id="personalityBtn">
        <span class="icon">🧠</span>
        <span class="label">人格照片</span>
      </button>
      <button class="bottom-btn" id="zodiacBtn">
        <span class="icon">🐲</span>
        <span class="label">动物头像</span>
      </button>
    </div>
  </nav>

  <div class="modal" id="confirmModal">
    <div class="modal-card">
      <div class="modal-title" id="confirmTitle">确认头像</div>
      <div class="modal-desc" id="confirmDesc">请先预览这张头像，确认后再进入主显示区。</div>
      <img id="confirmPreview" class="confirm-preview" alt="确认预览" />
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelConfirmBtn">重新选择</button>
        <button class="primary-btn" id="applyConfirmBtn">确认使用</button>
      </div>
    </div>
  </div>

  <audio
    id="bgmAudio"
    src="https://2026417.cd.bcebos.com/bgm.mp3"
    preload="auto"
    loop
    playsinline
    webkit-playsinline="true"
  ></audio>

  <input id="uploadInput" class="hidden-input" type="file" accept="image/*" />
  <input id="cameraInput" class="hidden-input" type="file" accept="image/*" capture="user" />

  
  <script>
    const CONFIG = {
      storageKey: 'ai_avatar_mobile_ui_v1',
      apiBaseKey: 'ai_avatar_api_base_v1',
      bgmStorageKey: 'ai_avatar_bgm_enabled_v1',

    async function attemptPlayBgm() {
      const audio = els.bgmAudio;
      if (!audio || !state.bgmEnabled) return false;
      try {
        audio.muted = false;
        audio.volume = 0.42;
        audio.loop = true;
        if (!audio.src) {
          audio.src = CONFIG.bgmUrl;
        }
        await audio.play();
        return true;
      } catch (error) {
        return false;
      }
    }

    function pauseBgm() {
      const audio = els.bgmAudio;
      if (!audio) return;
      audio.pause();
    }

    function setupBgm() {
      const audio = els.bgmAudio;
      if (!audio) return;
      audio.src = CONFIG.bgmUrl;
      audio.preload = 'auto';
      audio.loop = true;
      audio.volume = 0.42;

      const tryUnlockPlay = () => {
        if (state.bgmEnabled && audio.paused) {
          attemptPlayBgm();
        }
      };

      document.addEventListener('touchstart', tryUnlockPlay, { passive: true });
      document.addEventListener('click', tryUnlockPlay, { passive: true });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          state.bgmResumeAfterVisibility = state.bgmEnabled && !audio.paused;
          audio.pause();
          return;
        }
        if (state.bgmEnabled && (state.bgmResumeAfterVisibility || audio.paused)) {
          attemptPlayBgm();
        }
        state.bgmResumeAfterVisibility = false;
      });

      if (state.bgmEnabled) {
        attemptPlayBgm();
      }
    }

    async function prepareUploadPayload(file) {
      const originalDataUrl = await fileToDataURL(file);
      const img = await dataUrlToImage(originalDataUrl);
      const longestSide = Math.max(img.width, img.height);
      const shouldKeepOriginal = file.size <= 4.5 * 1024 * 1024 && longestSide <= 2048;

      if (shouldKeepOriginal) {
        return { dataUrl: originalDataUrl, base64: originalDataUrl.split(',')[1] || '' };
      }

      const targetLongestSide = longestSide > 3200 ? 2048 : 1792;
      const compressedDataUrl = await compressImage(img, targetLongestSide, 0.92);
      return { dataUrl: compressedDataUrl, base64: compressedDataUrl.split(',')[1] || '' };
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('读取图片失败'));
        reader.readAsDataURL(file);
      });
    }

    function dataUrlToImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('图片解析失败'));
        img.src = dataUrl;
      });
    }

    function compressImage(img, targetLongestSide, quality) {
      const canvas = document.createElement('canvas');
      let { width, height } = img;
      const longest = Math.max(width, height);
      if (longest > targetLongestSide) {
        const ratio = targetLongestSide / longest;
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      return canvas.toDataURL('image/jpeg', quality);
    }

    async function callGenerateApi({ mode, value, label, negativePrompt, customPrompt = '' }) {
      const apiBase = await ensureApiBase();
      const endpoint = `${apiBase.replace(/\/$/, '')}/generate`;
      const payload = {
        imageBase64: state.uploadBase64,
        mode,
        value,
        label: label || '',
        size: CONFIG.size,
        negativePrompt: negativePrompt || CONFIG.zodiacNegativePrompt,
        customPrompt
      };

      let response;
      try {
        response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        const isLocalFile = location.protocol === 'file:';
        const hint = isLocalFile
          ? '当前页面是通过 file:// 打开的。请优先改用本地 HTTP 服务打开，或确认函数触发器已允许跨域返回 Access-Control-Allow-Origin。'
          : '请检查函数地址、网络连通性，以及函数触发器的跨域响应头配置。';
        throw new Error(`请求后端失败：${error.message || error}。${hint}`);
      }

      const text = await response.text();
      let data = null;
      try {
        data = JSON.parse(text);
      } catch (error) {
        throw new Error(`后端返回非 JSON：${text.slice(0, 80)}`);
      }

      if (!response.ok || !data.success) {
        throw new Error(data.message || `接口请求失败（${response.status}）`);
      }
      if (!data.imageUrl) {
        throw new Error('后端未返回 imageUrl');
      }
      return data.imageUrl;
    }

    async function ensureApiBase() {
      if (state.apiBase) return state.apiBase;
      throw new Error('程序中尚未填写固定后端地址，请修改 CONFIG.fixedApiBase');
    }

    function resetCaches() {
      state.personalityCache.clear();
      state.zodiacCache.clear();
    }

    function renderImage(imageUrl, label, desc) {
      const hasImage = !!imageUrl;
      els.viewerImage.style.display = hasImage ? 'block' : 'none';
      els.viewerEmpty.style.display = hasImage ? 'none' : 'flex';
      if (hasImage) {
        els.viewerImage.src = imageUrl;
        els.viewerImage.alt = `${label}预览图`;
      } else {
        els.viewerImage.removeAttribute('src');
        els.viewerImage.alt = '预览图';
      }

      els.sceneTitle.textContent = label;
      els.sceneDesc.textContent = desc;
      els.modeTag.textContent = modeText(state.currentMode);
      els.hintPill.textContent = hasImage
        ? (state.currentMode === 'original' ? '可点击“人格照片”或“动物头像”开始生成' : '长按主图可临时查看原图')
        : '上传头像后，四个按钮都围绕这个主显示区工作';
    }

    function renderScene() {
      renderImage(state.currentImageUrl, state.currentLabel, state.currentDesc);
    }

    function modeText(mode) {
      if (mode === 'personality') return '人格写真';
      if (mode === 'zodiac') return '动物头像';
      if (mode === 'original') return '原图已确认';
      return '未开始';
    }

    function setLoading(show, text) {
      state.isLoading = show;
      els.loadingMask.classList.toggle('show', show);
      if (text) els.loadingText.textContent = text;
    }

    function setStatus(text) {
      els.statusText.textContent = text;
      els.statusInline.classList.add('show');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => {
        els.statusInline.classList.remove('show');
      }, 2200);
    }
  </script>
</body>
</html>
